# Benchmark: ycode vs opencode
#
# Both use Claude Sonnet 4 via explicit model flags.
# Both must be installed and in PATH.
#
# Usage:
#   aperio benchmark evals/specs/ycode-vs-opencode.yaml

name: "ycode-vs-opencode"
description: "Head-to-head: ycode vs opencode (claude-sonnet-4)"
runs: 3
parallel: false
output_dir: "evals/results/ycode-vs-opencode"

task:
  query: |
    Create a Python CLI tool called 'todo.py' in the current directory with:
    1. Add, list, complete, and delete tasks stored in a JSON file (todos.json)
    2. Use argparse with subcommands: add, list, done, delete
    3. Each task has: id, title, completed, created_at
    4. Pretty-print output with status indicators
    5. Create 'test_todo.py' with pytest tests covering all operations
    6. All tests must pass
  working_dir: "/tmp/aperio-eval-workspace"
  setup_cmd: "rm -rf /tmp/aperio-eval-workspace && mkdir -p /tmp/aperio-eval-workspace && cd /tmp/aperio-eval-workspace && git init"
  cleanup_cmd: "rm -rf /tmp/aperio-eval-workspace"
  timeout: "5m"
  validation:
    - type: command
      value: "cd /tmp/aperio-eval-workspace && python3 -m pytest test_todo.py -v"
    - type: file_exists
      value: "todo.py"
    - type: file_exists
      value: "test_todo.py"

tools:
  - name: ycode
    command: ["ycode", "prompt", "--model", "claude-sonnet-4", "{{.Query}}"]
    mode: source
    go_tracer: dlv
    env:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    targets:
      - "api.anthropic.com"

  - name: opencode
    command: ["opencode", "run", "-m", "anthropic/claude-sonnet-4", "{{.Query}}"]
    mode: blackbox
    env:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    targets:
      - "api.anthropic.com"

pricing:
  claude-sonnet-4:
    input: 0.003
    output: 0.015
