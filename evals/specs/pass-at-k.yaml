# Benchmark: pass@k evaluation
#
# Runs each tool 10 times on the same task to compute unbiased pass@k metrics
# (the standard estimator from the Codex paper). This measures reliability:
# how likely is the tool to produce a correct solution in k attempts?
#
# Usage:
#   aperio benchmark evals/specs/pass-at-k.yaml
#   aperio benchmark evals/specs/pass-at-k.yaml --format all

name: "pass-at-k"
description: "pass@k evaluation: 10 trials per tool on a Go coding task"
runs: 10
parallel: false
output_dir: "evals/results/pass-at-k"
pass_k: [1, 3, 5, 10]

task:
  query: |
    Create a Go package in the current directory with:
    1. A file 'lru.go' implementing an LRU cache with generic types: LRUCache[K comparable, V any]
    2. Constructor: NewLRUCache[K, V](capacity int) *LRUCache[K, V]
    3. Methods: Get(key K) (V, bool), Put(key K, value V), Len() int
    4. Evict least recently used entry when capacity is exceeded
    5. O(1) Get and Put using a doubly linked list + hash map
    6. Create 'lru_test.go' with table-driven tests covering:
       - basic get/put, capacity eviction, access-order updates, zero capacity
    7. All tests must pass with 'go test ./...'
  working_dir: "/tmp/aperio-eval-workspace"
  setup_cmd: "rm -rf /tmp/aperio-eval-workspace && mkdir -p /tmp/aperio-eval-workspace && cd /tmp/aperio-eval-workspace && git init && go mod init lru"
  cleanup_cmd: "rm -rf /tmp/aperio-eval-workspace"
  timeout: "5m"
  validation:
    - type: command
      value: "cd /tmp/aperio-eval-workspace && go test ./... -v"
    - type: file_exists
      value: "lru.go"
    - type: file_exists
      value: "lru_test.go"
    - type: command
      value: "cd /tmp/aperio-eval-workspace && go vet ./..."

tools:
  - name: ycode
    command: ["ycode", "prompt", "--model", "claude-sonnet-4", "{{.Query}}"]
    mode: blackbox
    env:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    targets:
      - "api.anthropic.com"

  - name: claude-code
    command: ["claude", "--model", "sonnet", "-p", "{{.Query}}"]
    mode: blackbox
    env:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    targets:
      - "api.anthropic.com"

  - name: aider
    command: ["aider", "--model", "claude-3.5-sonnet", "--yes-always", "--no-auto-commits", "--message", "{{.Query}}"]
    mode: blackbox
    env:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    targets:
      - "api.anthropic.com"

  - name: codex
    command: ["codex", "-m", "o4-mini", "--approval-mode", "full-auto", "{{.Query}}"]
    mode: blackbox
    env:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
    targets:
      - "api.openai.com"

pricing:
  claude-sonnet-4:
    input: 0.003
    output: 0.015
  claude-3.5-sonnet:
    input: 0.003
    output: 0.015
  o4-mini:
    input: 0.0011
    output: 0.0044
