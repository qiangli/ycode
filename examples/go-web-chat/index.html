<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ycode Chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #1a1b26; color: #c0caf5; height: 100vh; display: flex; flex-direction: column; }
#messages { flex: 1; overflow-y: auto; padding: 1rem; }
.msg { margin-bottom: 1rem; padding: 0.75rem 1rem; border-radius: 8px; max-width: 80%; white-space: pre-wrap; word-wrap: break-word; }
.msg.user { background: #3b4261; margin-left: auto; }
.msg.assistant { background: #24283b; }
.msg.tool { background: #1f2335; border-left: 3px solid #7aa2f7; font-size: 0.85rem; color: #7aa2f7; }
.msg.error { background: #2d1b2e; border-left: 3px solid #f7768e; color: #f7768e; }
#input-area { display: flex; padding: 1rem; gap: 0.5rem; background: #16161e; border-top: 1px solid #3b4261; }
#input { flex: 1; padding: 0.75rem; border-radius: 8px; border: 1px solid #3b4261; background: #1a1b26; color: #c0caf5; font-size: 1rem; outline: none; }
#input:focus { border-color: #7aa2f7; }
#send { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; background: #7aa2f7; color: #1a1b26; font-weight: 600; cursor: pointer; }
#send:hover { background: #89b4fa; }
#send:disabled { opacity: 0.5; cursor: not-allowed; }
header { padding: 0.75rem 1rem; background: #16161e; border-bottom: 1px solid #3b4261; font-size: 0.9rem; color: #565f89; }
</style>
</head>
<body>
<header>ycode agent chat — local Ollama (full agentic mode: tools + memory)</header>
<div id="messages"></div>
<div id="input-area">
  <input id="input" type="text" placeholder="Ask anything..." autocomplete="off">
  <button id="send">Send</button>
</div>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
let ws, currentMsg;

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    switch (data.type) {
      case 'delta':
        if (!currentMsg) { currentMsg = addMsg('assistant', ''); }
        currentMsg.textContent += data.text;
        messages.scrollTop = messages.scrollHeight;
        break;
      case 'tool':
        addMsg('tool', `[${data.tool}] ${data.detail}`);
        break;
      case 'done':
        currentMsg = null;
        sendBtn.disabled = false;
        input.focus();
        break;
      case 'error':
        addMsg('error', data.text);
        currentMsg = null;
        sendBtn.disabled = false;
        break;
    }
  };
  ws.onclose = () => setTimeout(connect, 1000);
}

function addMsg(cls, text) {
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function send() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  addMsg('user', text);
  ws.send(JSON.stringify({ text }));
  input.value = '';
  sendBtn.disabled = true;
}

input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
sendBtn.addEventListener('click', send);
connect();
</script>
</body>
</html>
