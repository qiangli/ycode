receivers:
  otlp:
    protocols:
      grpc: { endpoint: "127.0.0.1:4317" }
      http: { endpoint: "127.0.0.1:4318" }

processors:
  batch:
    timeout: 5s
  memory_limiter:
    limit_mib: 256
    check_interval: 5s

exporters:
  prometheus:
    endpoint: "127.0.0.1:8889"
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: "127.0.0.1:13133"

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, memory_limiter]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch, memory_limiter]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
