<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ycode live</title>
  <style>
    body { font: 13px -apple-system, system-ui, sans-serif; width: 260px; margin: 0; padding: 12px; }
    h1 { font-size: 14px; margin: 0 0 8px 0; }
    label { display: block; margin: 8px 0 4px 0; color: #555; }
    input[type=number] { width: 80px; padding: 4px; }
    button { padding: 6px 12px; margin-right: 4px; cursor: pointer; }
    #status { margin-top: 10px; padding: 6px; border-radius: 4px; }
    #status.connected { background: #e6f7e6; color: #135f13; }
    #status.disconnected { background: #f6f6f6; color: #555; }
    #status.connecting { background: #fff3cd; color: #6b4f00; }
    .hint { color: #777; font-size: 11px; margin-top: 8px; line-height: 1.4; }
  </style>
</head>
<body>
  <h1>ycode live</h1>
  <label for="port">ycode port</label>
  <input id="port" type="number" min="1" max="65535" value="58082" />
  <div style="margin-top: 10px;">
    <button id="connect">Connect this tab</button>
    <button id="disconnect">Disconnect</button>
  </div>
  <div id="status" class="disconnected">disconnected</div>
  <div class="hint">
    Pin this extension and click <strong>Connect this tab</strong> on
    whichever tab you want ycode to drive. The websocket connects to
    <code>127.0.0.1:&lt;port&gt;</code>.
  </div>
  <script src="popup.js"></script>
</body>
</html>
