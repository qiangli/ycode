<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ycode Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Chat</h2>
                <div class="sidebar-actions">
                    <button id="dashboard-btn" title="Dashboard">&#9776;</button>
                    <button id="new-room-btn" title="New Room">+</button>
                </div>
            </div>
            <ul id="room-list"></ul>
            <div class="sidebar-footer">
                <div id="connection-status" class="status-dot disconnected"></div>
                <span id="status-text">Disconnected</span>
            </div>
        </aside>
        <main id="chat-area">
            <div id="chat-header">
                <h3 id="room-name">Select a room</h3>
                <div id="typing-indicator" class="hidden"></div>
            </div>
            <div id="messages"></div>
            <form id="message-form" class="hidden">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </main>
        <!-- Dashboard overlay -->
        <div id="dashboard" class="hidden">
            <div class="dash-header">
                <h2>Dashboard</h2>
                <button id="dash-close">&times;</button>
            </div>
            <div class="dash-section">
                <h3>Channels</h3>
                <div id="dash-channels"></div>
            </div>
            <div class="dash-section">
                <h3>Rooms</h3>
                <div id="dash-rooms"></div>
            </div>
        </div>
    </div>
    <script src="chat.js"></script>
</body>
</html>
