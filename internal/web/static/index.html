<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ycode</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <h1>ycode</h1>
        <span id="status-badge" class="badge">connecting...</span>
      </div>
      <div class="header-right">
        <select id="model-select" class="header-select" aria-label="Model" title="Active model">
          <option value="">…</option>
        </select>
        <select id="theme-select" class="header-select" aria-label="Theme" title="Theme">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
        <button id="canvas-toggle" class="header-btn hidden" type="button" aria-label="Toggle canvas pane" title="Toggle canvas">✦</button>
        <span id="token-count" class="token-count"></span>
      </div>
    </header>

    <div id="shell">
      <main id="messages" role="log" aria-live="polite">
        <div id="welcome" class="welcome">
          <p>Connected to ycode. Type a message to start.</p>
        </div>
      </main>

      <aside id="canvas-pane" class="canvas-pane collapsed" aria-label="Canvas">
        <div class="canvas-pane-header">
          <span class="canvas-pane-title">Canvas</span>
          <button id="canvas-close" class="canvas-pane-close" type="button" aria-label="Close canvas">×</button>
        </div>
        <div id="canvas-pane-root" class="canvas-pane-root"></div>
      </aside>
    </div>

    <footer id="input-area">
      <div id="tool-progress" class="tool-progress hidden"></div>
      <form id="input-form">
        <textarea id="input" rows="2" placeholder="Send a message..." autofocus></textarea>
        <button type="submit" id="send-btn" title="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </form>
    </footer>
  </div>
  <script src="canvas/a2ui.js"></script>
  <script src="canvas/canvas.js"></script>
  <script src="app.js"></script>
</body>
</html>
