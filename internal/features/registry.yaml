      dogfood_weeks: 4
      failure_mode_doc: false

  - name: lsp
    tier: stable
    description: "auto-detected LSP servers per language — hover, definition, references, symbol search"
    files: [internal/runtime/lsp]
    graduation:
      integration_test: true
      dogfood_weeks: 4
      failure_mode_doc: false

  - name: bonsai-graph
    tier: stable
    description: "embeddable Dgraph (bonsai) for memory relations + code-knowledge mirror; DQL-queryable; Explorer UI mounted at /graph/ in `ycode serve`"
    files: [pkg/memex/graph]
    graduation:
