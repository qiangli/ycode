# Feature registry — single source of truth for which capabilities ship in
# default builds vs. behind experimental/wip build tags. See
# docs/strategy.md#feature-tiers for policy and graduation criteria.
#
# Tiers:
#   stable        — always compiled. Integration-tested + dogfooded ≥2 weeks +
#                   failure mode documented. In README/benchmarks.
#   experimental  — opt-in via `-tags experimental`. New/rough; not in README.
#   wip           — opt-in via `-tags wip`. Active development; not user-facing.
#
# Graduation: a feature moves wip → experimental → stable via PR. CI fails if
# tier=stable without graduation criteria satisfied.
#
# Surfaced to users via `ycode features list` / `ycode features readme`
# — keep `description` short and user-facing.

features:
  # ─── core agent loop ──────────────────────────────────────────────────────
  - name: bash-tool
    tier: stable
    description: "in-process bash via mvdan/sh — no host shell exec, with security middleware (Setpgid, pre-exec validation)"
    files: [internal/runtime/bash]
    graduation:
      integration_test: true
      dogfood_weeks: 8
      failure_mode_doc: false

  - name: file-ops
    tier: stable
    description: "read, write, edit, glob — file operations bounded by the per-session VFS"
    files: [internal/tools]
    graduation:
      integration_test: true
      dogfood_weeks: 8
      failure_mode_doc: false

  - name: search-tools
    tier: stable
    description: "Grep, Glob, semantic search, symbol search, AST search across the project"
    files: [internal/tools, internal/runtime/treesitter]
    graduation:
      integration_test: true
      dogfood_weeks: 8
      failure_mode_doc: false

  - name: web-tools
    tier: stable
    description: "WebFetch, WebSearch — auto-routes between Brave / Tavily / SearXNG / DuckDuckGo"
    files: [internal/tools, internal/runtime/searxng]
    graduation:
      integration_test: true
      dogfood_weeks: 4
      failure_mode_doc: false

  # ─── code intelligence ────────────────────────────────────────────────────
  - name: repomap
