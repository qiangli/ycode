name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build image
        run: docker build -t ycode-builder .

      - name: Compile
        run: docker run --rm ycode-builder make compile

      - name: Vet
        run: docker run --rm ycode-builder make vet

      - name: Test
        run: docker run --rm ycode-builder make test
