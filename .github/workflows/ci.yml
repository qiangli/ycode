name: CI

# Lean publish-shaped CI: prove the binary compiles, vet passes, and a small
# fast test subset is green. That's the GH contract.
#
# Heavy work — full -race unit suite, TUI integration, TUI E2E, container
# tests, evals — runs locally via `make ci` (Docker, parity with what GH used
# to do here). The pre-push git hook (`make install-hooks`) enforces it
# before push, so coverage on PR is preserved without paying the GH cost on
# every push.
#
# Why native (no docker) on the runner?
#   - Docker Hub rate-limits anonymous pulls of golang:1.26-bookworm. That's
#     the source of the 47-min outlier builds.
#   - actions/setup-go's module cache survives across runs. A clean docker
#     build re-downloads the entire dep tree (including external/) every job.
#   - Apt-installing the CGO deps natively is one layer instead of three.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Cold-cache headroom: first run after this workflow lands has to compile
    # every transitive dep of cmd/ycode (the build cache is empty until a run
    # finishes). After actions/setup-go's cache primes, subsequent runs are
    # ~1-2 min. 15 min is a hard cap, not a target.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          # Default fetch-depth (1) is enough — go build does not need history.

      - name: Bootstrap sibling deps (../sh, ../nadir)
        run: ./scripts/bootstrap-siblings.sh

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # CGO deps required by the vendored podman/buildah and sqlite. Same set
      # as Dockerfile and release.yml install.
      - name: Install CGO build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libbtrfs-dev libgpgme-dev libsqlite3-dev

      # Note: `go vet` is intentionally NOT here. Vet's cold-cache cost is the
      # same as a full compile (it builds every package to analyse it), which
      # doubles the CI time for the same byte-paths the compile step already
      # covers. Vet runs in `make ci` locally via the pre-push hook, where
      # warm caches make it fast.

      # Compile-only check — proves the binary builds. We don't need to
      # install or run; release.yml is the canonical artifact path.
      - name: Compile
        run: |
          go build -trimpath \
            -tags "sqlite,sqlite_unlock_notify,bindata" \
            -o /dev/null ./cmd/ycode/

      # Tiny fast test subset: deterministic, no network, no -race, no
      # container, no LLM. Race detector + the rest of the suite live in
      # `make ci` locally.
      - name: Fast unit tests
        run: |
          go test -short -count=1 -timeout 120s \
            ./internal/eval/contract/... \
            ./internal/runtime/mcp/... \
            ./internal/features/...
