name: verify-features

# Gates the feature-tier registry: every feature declared in
# internal/features/registry.yaml must reference paths that exist, have a
# valid tier, and (for stable features, eventually) meet graduation criteria.
# See docs/strategy.md#feature-tiers for policy.
#
# Native ubuntu-latest + setup-go cache — same shape as ci.yml. The features
# package has no CGO needs, so this stays minimal.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'internal/features/**'
      - 'cmd/ycode/features_cmd.go'
      - '.github/workflows/verify-features.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    # Same cold-cache reasoning as ci.yml — first run primes the build cache.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Bootstrap sibling deps (../sh, ../nadir, ../coreutils)
        run: ./scripts/bootstrap-siblings.sh

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run features package tests
        run: go test -short -count=1 -timeout 60s ./internal/features/...
