name: verify-features

# Gates the feature-tier registry: every feature declared in
# internal/features/registry.yaml must reference paths that exist, have a
# valid tier, and (for stable features, eventually) meet graduation criteria.
#
# See docs/strategy.md#feature-tiers for policy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'internal/features/**'
      - 'cmd/ycode/features_cmd.go'
      - '.github/workflows/verify-features.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # peers/aperio + peers/bonsai are git submodules referenced by go.work;
          # without them, `go test ./internal/features/...` fails to load the
          # workspace.
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Same CGO deps as release.yml: ./internal/features/... transitively
      # imports go.podman.io/storage (btrfs driver) and the cgo gpgme
      # signature verifier, so the test compile pulls in the system
      # headers. Without these the build fails with "btrfs/version.h:
      # No such file or directory".
      - name: Install build dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libbtrfs-dev libgpgme-dev libsqlite3-dev

      - name: Verify feature registry
        run: make verify-features

      - name: Run features package tests
        run: go test -short -race ./internal/features/...
