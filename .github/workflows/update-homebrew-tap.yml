name: update-homebrew-tap

# Fires after a GitHub Release is published (i.e. after the release.yml
# workflow's publish job creates one). Generates a fresh Homebrew formula
# from the release's SHA256SUMS and pushes it to the tap repo.
#
# Auth: a deploy key (SSH) on the qiangli/homebrew-ycode repo, with the
# private half stored here as the HOMEBREW_TAP_DEPLOY_KEY secret. Deploy
# keys are scoped to a single repo and don't appear in account-wide token
# lists — smaller blast radius than a PAT and cleaner to rotate. See
# docs/release.md for the bootstrap.
#
# Until the secret is configured, this workflow exits cleanly with a
# notice — it never fails the release.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: read

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve target tag
        id: tag
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          TAG="${DISPATCH_TAG:-$RELEASE_TAG}"
          if [ -z "$TAG" ]; then
            echo "no tag resolved; aborting" >&2
            exit 1
          fi
          # Strip leading v if present for the version string in the formula.
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check deploy key is configured
        id: token
        env:
          DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          if [ -z "${DEPLOY_KEY:-}" ]; then
            echo "HOMEBREW_TAP_DEPLOY_KEY secret not set — see docs/release.md to bootstrap" >&2
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download SHA256SUMS from the release
        if: steps.token.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern SHA256SUMS \
            --output SHA256SUMS

      - name: Generate formula
        if: steps.token.outputs.configured == 'true'
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p generated/Formula
          ./scripts/generate-homebrew-formula.sh "$VERSION" SHA256SUMS \
            > generated/Formula/ycode.rb
          echo "--- generated formula ---"
          cat generated/Formula/ycode.rb

      - name: Configure SSH for deploy key
        if: steps.token.outputs.configured == 'true'
        env:
          DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # The secret is the literal private key (created with ssh-keygen);
          # write it as-is and trust ssh's parser to validate.
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Pin GitHub's host key to defend against TOFU-bypass attacks.
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Push formula to tap repo
        if: steps.token.outputs.configured == 'true'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git config --global user.name "ycode-release-bot"
          git config --global user.email "ycode-release-bot@users.noreply.github.com"
          git clone git@github.com:qiangli/homebrew-ycode.git tap
          mkdir -p tap/Formula
          cp generated/Formula/ycode.rb tap/Formula/ycode.rb
          cd tap
          if git diff --quiet; then
            echo "tap already up-to-date for ${TAG}"
          else
            git add Formula/ycode.rb
            git commit -m "ycode ${TAG}"
            git push
            echo "pushed ${TAG} to qiangli/homebrew-ycode"
          fi
