name: release

# Dual-mode workflow:
#
# 1. **Tag push (v*)**: full release. Build matrix → package → publish a
#    GitHub Release with binaries and SHA256SUMS.
#
# 2. **Manual dispatch / PR touching this workflow**: dryrun. Build matrix
#    only — no Release is created. This is the gate that must pass green
#    before any new tag is created (see
#    feedback_no_tag_while_fixing in user memory: never tag to test a fix).
#
# Phase 2 unlock: prebuilt binaries are the prerequisite for brew/go install/
# npx wrappers. See docs/strategy.md#phase-2--on-ramp.
#
# Versioning: semver. Pre-1.0 = breaking changes expected. Tags containing a
# hyphen (e.g., v0.1.0-rc.1) are auto-marked as pre-release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/release.yml'

permissions:
  contents: write  # required to create releases and upload assets

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runs-on: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - target: linux-arm64
            # GitHub's free arm64 Linux runner (public repos). Builds
            # natively — no aarch64 cross-compile toolchain needed.
            runs-on: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            ext: ""
          - target: darwin-arm64
            runs-on: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          # Still excluded — each requires code work, not just CI fix:
          #   darwin-amd64: pkg/oci/machine → podman libkrun has
          #     //go:build darwin && arm64 — internal/container/machine.go
          #     imports it unconditionally, so darwin-amd64 fails to compile.
          #   windows-amd64: external/podman/pkg/util/rlimit.go uses
          #     unix.Rlimit/Getrlimit — Unix-only.
          # Tracked as follow-up; both need podman/buildah integration
          # to become build-tag-conditional. Don't add a target back to
          # this matrix until a successful native build has been
          # confirmed. The outpost ycode supervisor surfaces "ycode is
          # not available for this platform" via the admin UI for the
          # two excluded targets.
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Bootstrap sibling deps (../sh, ../nadir, ../coreutils)
        run: ./scripts/bootstrap-siblings.sh

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # System CGO deps required by the vendored podman/buildah:
      #   - libgpgme-dev: signature verification in image/v5/signature
      #   - libbtrfs-dev: storage/drivers/btrfs (Linux only)
      #   - libsqlite3-dev: matches the Dockerfile's compile env
      # Same packages installed in the Dockerfile builder image; the release
      # workflow runs natively (not in the container) so we install here too.
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libbtrfs-dev libgpgme-dev libsqlite3-dev cmake ccache

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install gpgme ccache

      # ccache + sccache speed up llama.cpp's repeated CMake rebuilds
      # (the embedded ollama runner). First clean run ~3-5 min; warm
      # ccache hit ~30s. Cache key includes the external/ollama
      # submodule SHA so we invalidate on upstream bumps.
      - name: Restore ccache (for llama.cpp)
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.target }}-${{ hashFiles('external/ollama/**/CMakeLists.txt', 'external/ollama/.git/HEAD') }}
          restore-keys: |
            ccache-${{ matrix.target }}-

      - name: Verify feature registry
        run: go test -count=1 ./internal/features/...

      # Build all embeds from source (no fetch fallback in CI — release
      # builds are the canonical producer of the .gz blobs). Sets
      # BUILD_EMBEDS_FROM_SOURCE=1 so the *-if-missing wrappers skip
      # the embed-fetch step. Each platform builds only the embeds
      # applicable to it (per Makefile gates: vfkit darwin-only,
      # gvproxy darwin+windows-only).
      - name: Build embed blobs from source
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BUILD_EMBEDS_FROM_SOURCE: "1"
          CC: "ccache cc"
          CXX: "ccache c++"
        run: |
          set -euo pipefail
          make ensure-embeds
          echo "--- embed blobs produced ---"
          ls -lh internal/container/podman_embed/podman.gz       2>/dev/null || echo "(no podman gz)"
          ls -lh internal/container/vfkit_embed/vfkit.gz         2>/dev/null || echo "(no vfkit gz)"
          ls -lh internal/container/gvproxy_embed/gvproxy.gz     2>/dev/null || echo "(no gvproxy gz)"

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          # On tag push, ref_name is the tag (v0.x.y). On dispatch/PR, it's
          # the branch name. The dryrun build doesn't create a Release so the
          # version string just labels the binary "vX.Y.Z-dryrun" — useful
          # when verifying the workflow without polluting the version
          # sequence.
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN="dist/ycode-${{ matrix.target }}${{ matrix.ext }}"
          # Suffix non-tag builds with -dryrun so the resulting binary's
          # `ycode --version` makes it obvious this isn't a release artifact.
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            VERSION="${VERSION}-dryrun"
          fi
          # Use `make _compile-inner` so TAG_LIST's wildcard probe runs
          # AFTER `Build embed blobs from source` above, picking up the
          # newly-produced .gz files and adding the corresponding
          # embed_* tags. (Calling `make compile` would re-trigger the
          # embed prereqs unnecessarily — _compile-inner is just the
          # final go-build step.) VERSION/COMMIT propagate into
          # Makefile's LDFLAGS substitution.
          make --no-print-directory _compile-inner
          mv bin/ycode "$BIN"
          # Ad-hoc codesign on macOS so binaries don't get killed by Gatekeeper.
          if [ "$RUNNER_OS" = "macOS" ]; then
            codesign -f -s - "$BIN" 2>/dev/null || true
          fi
          ls -la "$BIN"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ycode-${{ matrix.target }}
          path: dist/ycode-${{ matrix.target }}${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 1

      # Per-embed .gz uploads — published as standalone release assets
      # so devs can grab them via scripts/embed-fetch.sh and skip the
      # multi-minute source build. Naming convention matches
      # embed-fetch.sh: <embed>-<platform>.gz. Missing files are
      # silently skipped (e.g., vfkit/gvproxy on linux don't exist).
      - name: Stage embed blobs for upload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p embed-dist
          # Each line is "<source-relative-path> <renamed-dest>".
          # Renaming embeds the platform suffix so a single release can
          # carry all 4 platforms' embeds side-by-side.
          stage_if_present() {
            local src="$1" dest="$2"
            [ -f "$src" ] || { echo "  (skip $src — not present on ${{ matrix.target }})"; return 0; }
            cp "$src" "embed-dist/$dest"
            ls -lh "embed-dist/$dest"
          }
          stage_if_present internal/container/podman_embed/podman.gz \
                           podman-${{ matrix.target }}.gz
          stage_if_present internal/container/vfkit_embed/vfkit.gz \
                           vfkit-${{ matrix.target }}.gz
          stage_if_present internal/container/gvproxy_embed/gvproxy.gz \
                           gvproxy-${{ matrix.target }}.gz

      - name: Upload embed blobs artifact
        uses: actions/upload-artifact@v7
        with:
          name: embeds-${{ matrix.target }}
          path: embed-dist/
          if-no-files-found: warn
          retention-days: 1

  # Packages artifacts on every successful build (tag, dispatch, or PR) so
  # the workflow's packaging logic itself is exercised on dryruns. The
  # publish step below is gated to tag pushes only.
  package:
    name: package
    needs: build
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.flags.outputs.is_release }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Compute release flags
        id: flags
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package archives + embed blobs + checksums
        run: |
          set -euo pipefail
          mkdir -p release-assets

          # Per-platform ycode binary tarballs (existing behavior).
          for dir in artifacts/ycode-*; do
            target=$(basename "$dir" | sed 's/^ycode-//')
            cd "$dir"
            cp "ycode-${target}" ycode
            chmod +x ycode
            tar -czf "../../release-assets/ycode-${target}.tar.gz" ycode
            rm ycode
            cd ../..
          done

          # Per-platform embed blobs (standalone .gz, consumed by
          # scripts/embed-fetch.sh). Each embeds-<target>/ dir holds 1-4
          # files depending on platform applicability — copy them all.
          for dir in artifacts/embeds-*; do
            [ -d "$dir" ] || continue
            cp -v "$dir"/*.gz release-assets/ 2>/dev/null || true
          done

          cd release-assets
          # Single checksum file covers both binary tarballs and embed
          # .gz blobs so `embed-fetch.sh` can validate downloads.
          sha256sum *.tar.gz *.gz > SHA256SUMS 2>/dev/null || sha256sum *.tar.gz > SHA256SUMS
          ls -la

      - name: Upload packaged assets (dryrun visibility)
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: release-assets/
          retention-days: 7

  publish:
    name: publish release
    needs: package
    if: needs.package.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: release-assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PRERELEASE_FLAG=""
          case "$TAG" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            $PRERELEASE_FLAG \
            --title "$TAG" \
            --generate-notes \
            release-assets/*
