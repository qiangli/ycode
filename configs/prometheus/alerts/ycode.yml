groups:
  - name: ycode
    rules:
      - alert: YcodeAPIErrorRate
        expr: |
          rate(ycode_llm_call_total{success="false"}[5m])
          / rate(ycode_llm_call_total[5m]) > 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ycode LLM API error rate above 10%"
          description: "{{ $labels.model }} error rate is {{ $value | humanizePercentage }}"

      - alert: YcodeAPILatencyP99
        expr: |
          histogram_quantile(0.99, rate(ycode_llm_call_duration_bucket[5m])) > 30000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ycode LLM API p99 latency above 30s"
          description: "{{ $labels.model }} p99 latency is {{ $value | humanizeDuration }}"

      - alert: YcodeToolFailureRate
        expr: |
          rate(ycode_tool_call_total{success="false"}[5m])
          / rate(ycode_tool_call_total[5m]) > 0.25
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ycode tool failure rate above 25%"
          description: "Tool {{ $labels.tool_name }} failure rate is {{ $value | humanizePercentage }}"

      - alert: YcodeTokenBudgetExhausted
        expr: |
          ycode_llm_context_window_used > 0.90 * 200000
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ycode context window > 90% full"
          description: "Context window has {{ $value }} tokens used"

      - alert: YcodeCostThreshold
        expr: |
          rate(ycode_llm_cost_dollars_total[1h]) * 24 > 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "ycode estimated daily cost exceeds $10"
          description: "Projected daily cost: ${{ $value | printf \"%.2f\" }}"

      - alert: YcodeCompactionFrequency
        expr: |
          increase(ycode_compaction_total[1h]) > 3
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "ycode compaction triggered frequently"
          description: "{{ $value }} compactions in the last hour (possible prompt bloat)"

      - alert: YcodeRuntimePanic
        expr: |
          increase(ycode_runtime_panic_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "ycode runtime panic recovered"
          description: "{{ $value }} panic(s) in the last 5m from component {{ $labels.component }}"

      - alert: YcodeExcessiveToolCallsPerTurn
        expr: |
          histogram_quantile(0.95, rate(ycode_turn_tool_count_bucket[5m])) > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ycode p95 tool calls per turn above 50"
          description: "p95 tool calls per turn is {{ $value }} - suggests runaway tool use or stuck loop"

      - alert: YcodeToolLatencyTimeoutClass
        expr: |
          histogram_quantile(0.99, rate(ycode_tool_call_duration_bucket[5m])) > 60000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ycode tool p99 latency above 60s"
          description: "Tool {{ $labels.tool_name }} p99 is {{ $value }}ms - approaching timeout territory"

      - alert: YcodeTokenInputRateSpike
        expr: |
          rate(ycode_llm_tokens_input_total[5m]) > 1.5 * rate(ycode_llm_tokens_input_total[1h] offset 1h)
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ycode input token rate >50% above the previous hour"
          description: "Current 5m rate {{ $value }} input tokens/s vs the prior hour"

      - alert: YcodeHTTPRetryStorm
        expr: |
          rate(ycode_api_retry_attempts_total[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ycode API retry rate above 1/s"
          description: "Retry reason {{ $labels.reason }} firing >1/s - upstream provider likely degraded"

      - alert: YcodeBackendDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Observability backend down: {{ $labels.job }}"
          description: "Prometheus failed to scrape {{ $labels.instance }} for >1m"
