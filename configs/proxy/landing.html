<!DOCTYPE html>
<html>
<head>
  <title>ycode Observability</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: linear-gradient(135deg, #2c3e50 0%, #3a4a5c 50%, #2c3e50 100%);
      min-height: 100vh;
      padding: 60px 20px;
      color: #fff;
    }
    .container { max-width: 720px; margin: 0 auto; }
    h1 {
      font-size: 1.4em;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      margin-bottom: 28px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 80px);
      gap: 24px 28px;
    }
    .tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      gap: 8px;
    }
    .icon {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 600;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: transform 0.15s;
    }
    .tile:hover .icon { transform: scale(1.08); }
    .label {
      font-size: 11px;
      color: rgba(255,255,255,0.8);
      text-align: center;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .footer a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 12px;
    }
    .footer a:hover { color: rgba(255,255,255,0.8); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Favorites</h1>
    <div class="grid">
      <a class="tile" href="/prometheus/">
        <div class="icon" style="background:#3478f6">P</div>
        <span class="label">Prometheus</span>
      </a>
      <a class="tile" href="/alerts/">
        <div class="icon" style="background:#ff3b30">A</div>
        <span class="label">Alertmanager</span>
      </a>
      <a class="tile" href="/collector/">
        <div class="icon" style="background:#5ac8fa">C</div>
        <span class="label">Collector</span>
      </a>
      <a class="tile" href="/dashboard/">
        <div class="icon" style="background:#ff9500">D</div>
        <span class="label">Dashboard</span>
      </a>
      <a class="tile" href="/karma/">
        <div class="icon" style="background:#34c759">K</div>
        <span class="label">Karma</span>
      </a>
      <a class="tile" href="/logs/">
        <div class="icon" style="background:#af52de">L</div>
        <span class="label">Logs</span>
      </a>
    </div>
    <div class="footer">
      <a href="/healthz">/healthz</a>
    </div>
  </div>
</body>
</html>
