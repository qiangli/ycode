# ycode-specific skill-domain glossary.
#
# Layered on top of the generic seed glossary that ships with
# github.com/dhnt/dhnt/skills (which covers the structural keywords
# skill / step / needs and a handful of generic primitives). This
# file holds the entries ycode itself relies on — additional
# structural keywords (flow / in / out / do / on_fail / retry /
# escalate / budget / capability / intent), the type primitives
# (semver / markdown / range), and the capability foreign atoms
# (git / github / slack / llm / file).
#
# Loaders combine this file with the upstream seed via
# skills.Glossary.Merge.

entries:
  # ─── extended structural keywords ─────────────────────────────────
  - dhnt: felowu
    kind: keyword
    labels:
      en: [flow]
      zh: ["流程", liucheng]

  - dhnt: ini
    kind: keyword
    labels:
      en: [in, input]
      zh: ["输入", shuru]

  - dhnt: outo
    kind: keyword
    labels:
      en: [out, output]
      zh: ["输出", shuchu]

  - dhnt: do
    kind: keyword
    labels:
      en: [do]
      zh: ["执行", zhixing]

  - dhnt: onifaili
    kind: keyword
    labels:
      en: [onfail]
      zh: ["失败时", shibaishi]

  - dhnt: retoroyu
    kind: keyword
    labels:
      en: [retry]
      zh: ["重试", chongshi]

  - dhnt: esocalate
    kind: keyword
    labels:
      en: [escalate]
      zh: ["升级", shengji]

  - dhnt: budageto
    kind: keyword
    labels:
      en: [budget]
      zh: ["预算", yusuan]

  - dhnt: capabilitoyu
    kind: keyword
    labels:
      en: [capability]
      zh: ["能力", nengli]

  - dhnt: initenito
    kind: keyword
    labels:
      en: [intent]
      zh: ["意图", yitu]

  # ─── types ────────────────────────────────────────────────────────
  - dhnt: semivero
    kind: type
    labels:
      en: [semver]
      zh: ["语义版本", yuyibanben]

  - dhnt: marokidowuni
    kind: type
    labels:
      en: [markdown]
      all: [markdown]

  - dhnt: ranige
    kind: type
    labels:
      en: [range]
      zh: ["范围", fanwei]

  # ─── capabilities (foreign atoms — same in every language) ────────
  - dhnt: gito
    kind: capability
    labels:
      all: [git]

  - dhnt: gitohuba
    kind: capability
    labels:
      all: [github]

  - dhnt: solacaki
    kind: capability
    labels:
      all: [slack]

  - dhnt: lilimi
    kind: capability
    labels:
      en: [llm]
      all: [llm]

  - dhnt: file
    kind: capability
    labels:
      en: [file]
      zh: ["文件", wenjian]
